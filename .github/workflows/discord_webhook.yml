name: discord webhook notification

on:
  push:
  watch:
  fork:
  issues:
  pull_request:

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Send Discord embed
        run: |
          EVENT="${{ github.event_name }}"
          REPO="${{ github.repository }}"
          ACTOR="${{ github.actor }}"
          SHA="${{ github.sha }}"
          BRANCH="${{ github.ref_name }}"

          REPO_URL="https://github.com/$REPO"
          COMMIT_URL="https://github.com/$REPO/commit/$SHA"

          TIMESTAMP=$(date -u +%s)

          TITLE="GitHub Event"
          URL="$REPO_URL"
          DESC="Repository activity detected"
          FIELDS="[]"

          if [ "$EVENT" = "push" ]; then
            TITLE="New Push to $BRANCH"
            URL="$COMMIT_URL"

            COMMIT_MSG="${{ github.event.head_commit.message }}"
            COMMIT_AUTHOR="${{ github.event.head_commit.author.name }}"
            COMMIT_URL_FULL="${{ github.event.head_commit.url }}"

            DESC="New commit pushed to branch $BRANCH"

            FIELDS=$(jq -n \
              --arg branch "$BRANCH" \
              --arg actor "$ACTOR" \
              --arg msg "$COMMIT_MSG" \
              --arg author "$COMMIT_AUTHOR" \
              --arg commit "$COMMIT_URL_FULL" \
              '[
                {name:"Branch", value:$branch, inline:true},
                {name:"Pusher", value:$actor, inline:true},
                {name:"Author", value:$author, inline:true},
                {name:"Commit Message", value:$msg, inline:false},
                {name:"Commit URL", value:$commit, inline:false}
              ]'
            )

          elif [ "$EVENT" = "watch" ]; then
            TITLE="New Star"
            DESC="$ACTOR starred $REPO"
            URL="$REPO_URL"

          elif [ "$EVENT" = "fork" ]; then
            TITLE="New Fork"
            DESC="$ACTOR forked $REPO"
            URL="$REPO_URL"

          elif [ "$EVENT" = "issues" ]; then
            TITLE="Issue Activity"
            URL="${{ github.event.issue.html_url }}"
            DESC="${{ github.event.issue.title }}"

            FIELDS=$(jq -n \
              --arg user "${{ github.event.issue.user.login }}" \
              --arg state "${{ github.event.issue.state }}" \
              '[
                {name:"User", value:$user, inline:true},
                {name:"State", value:$state, inline:true}
              ]'
            )

          elif [ "$EVENT" = "pull_request" ]; then
            TITLE="Pull Request Activity"
            URL="${{ github.event.pull_request.html_url }}"
            DESC="${{ github.event.pull_request.title }}"

            FIELDS=$(jq -n \
              --arg user "${{ github.event.pull_request.user.login }}" \
              --arg state "${{ github.event.pull_request.state }}" \
              '[
                {name:"User", value:$user, inline:true},
                {name:"State", value:$state, inline:true}
              ]'
            )
          fi

          jq -n \
            --arg title "$TITLE" \
            --arg desc "$DESC" \
            --arg url "$URL" \
            --argjson fields "$FIELDS" \
            --arg timestamp "$TIMESTAMP" \
            '{
              embeds: [
                {
                  title: $title,
                  description: $desc,
                  url: $url,
                  color: 5814783,
                  fields: $fields,
                  footer: { text: "GitHub Activity" },
                  timestamp: ($timestamp | tonumber)
                }
              ]
            }' | curl -H "Content-Type: application/json" \
              -X POST \
              -d @- \
              ${{ secrets.DISCORD_WEBHOOK }}